version: "3.8"

services:
  # Postgres removed - using local Postgres.app (PG 17, pgvector 0.8.2) on port 5432
  # Database: filaments_db, User: filaments_user

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

volumes:
  redis_data:
